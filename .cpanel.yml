---
# public_html = live site. Git checkout lives in a separate folder on the server.
# Deploy copies FROM the repo checkout (pwd) INTO public_html.
deployment:
  tasks:
    - export DEPLOYPATH=/home/jh1gzqesepn/public_html/
    - export REPOPATH=$(pwd)
    - /bin/cp -R $REPOPATH/assets $DEPLOYPATH
    - /bin/cp -R $REPOPATH/blog $DEPLOYPATH
    - /bin/cp $REPOPATH/index.html $DEPLOYPATH
    - /bin/cp $REPOPATH/about.html $DEPLOYPATH
    - /bin/cp $REPOPATH/account.html $DEPLOYPATH
    - /bin/cp $REPOPATH/blog.html $DEPLOYPATH
    - /bin/cp $REPOPATH/contact.html $DEPLOYPATH
    - /bin/cp $REPOPATH/density-class-calculator.html $DEPLOYPATH
    - /bin/cp $REPOPATH/forms-library.html $DEPLOYPATH
    - /bin/cp $REPOPATH/greenos.html $DEPLOYPATH
    - /bin/cp $REPOPATH/greenos-dashboard.html $DEPLOYPATH
    - /bin/cp $REPOPATH/help-center.html $DEPLOYPATH
    - /bin/cp $REPOPATH/login.html $DEPLOYPATH
    - /bin/cp $REPOPATH/option.html $DEPLOYPATH
    - /bin/cp $REPOPATH/service-center-lookup.html $DEPLOYPATH
    - /bin/cp $REPOPATH/services.html $DEPLOYPATH
    - /bin/cp $REPOPATH/terms.html $DEPLOYPATH
    - /bin/cp $REPOPATH/thank-you.html $DEPLOYPATH
    - /bin/cp $REPOPATH/transit-calculator.html $DEPLOYPATH
    - /bin/cp $REPOPATH/robots.txt $DEPLOYPATH
    - /bin/cp $REPOPATH/sitemap.xml $DEPLOYPATH
    - /bin/cp $REPOPATH/deploy-check.txt $DEPLOYPATH
    - /bin/sh -c '/bin/date >> '"$DEPLOYPATH"'deploy-check.txt'
