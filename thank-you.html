<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Green Logistics</title>
  <meta name="robots" content="noindex, follow">
  <meta name="description" content="Thank you for contacting Green Logistics. Your registration request has been received.">
  <link rel="icon" type="image/png" href="assets/from-site/Logo.png">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .thank-you-wrap { min-height: 100vh; display: grid; place-items: center; padding: 2rem 1rem; }
    .thank-you-card { width: min(100%, 680px); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: clamp(1.4rem, 3.2vw, 2.2rem); text-align: center; }
    .thank-you-card h1 { margin: 0 0 .75rem; color: var(--color-heading); }
    .thank-you-card p { margin: 0 auto 1.1rem; color: var(--color-ink-muted); max-width: 42ch; }
    .thank-you-actions { display: flex; gap: .7rem; justify-content: center; flex-wrap: wrap; }
    .thank-you-actions a { text-decoration: none; }
  </style>
</head>
<body>
  <main class="thank-you-wrap">
    <section class="thank-you-card">
      <h1>Thank you for your registration</h1>
      <p>We received your request and sent it to our team. We will contact you as soon as possible.</p>
      <div class="thank-you-actions">
        <a class="hero-plexus-cta" href="index.html">Back to home</a>
        <a class="hero-plexus-secondary" href="login.html">Log in to your portal</a>
        <a class="hero-plexus-secondary" href="contact.html">Contact page</a>
      </div>
    </section>
  </main>
</body>
</html>
