name: Deploy to live site

# Deployment is handled on the server by cPanel Git Version Control + Cron:
#   /bin/bash /home/ijh19zqesepn/repositories/GreenGroup/tools/cpanel-cron-deploy.sh
# The cron runs `git reset --hard origin/main` and copies files into public_html,
# so this workflow does NOT push files itself (no FTP/SFTP, no secrets required).
# It only records the pushed commit and verifies the live site picked it up.

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Show pushed commit
        run: |
          echo "Pushed commit: ${{ github.sha }}"
          echo "cPanel cron will sync origin/main and deploy within its schedule."
          echo "Manual run: /bin/bash /home/ijh19zqesepn/repositories/GreenGroup/tools/cpanel-cron-deploy.sh"

      - name: Verify live site picked up the commit (via cPanel cron)
        continue-on-error: true
        run: |
          short="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "Looking for commit $short on the live site (waiting for cron)..."
          found=""
          for i in $(seq 1 10); do
            sleep 30
            check="$(curl -fsSL "https://greengrouplogistics.com/deploy-check.txt?cachebust=$(date +%s)" || true)"
            version="$(curl -fsSL "https://greengrouplogistics.com/deploy-version.txt?cachebust=$(date +%s)" || true)"
            if echo "$check" | grep -q "$short" || echo "$version" | grep -q "$short"; then
              found="yes"
              echo "Live site is on commit $short."
              break
            fi
            echo "Attempt $i/10: not deployed yet."
          done
          if [ -z "$found" ]; then
            echo "::notice::Live site has not synced commit $short yet."
            echo "::notice::Check cPanel: Git Version Control repo exists at /home/ijh19zqesepn/repositories/GreenGroup and the cron job is enabled."
          fi
