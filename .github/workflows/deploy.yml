name: Deploy to live site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write deploy marker
        run: echo "${{ github.sha }}" > deploy-version.txt

      - name: Deploy via SFTP to public_html
        id: sftp
        continue-on-error: true
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: ./*
          remote_path: /home/ijh19zqesepn/public_html/
          sftp_only: true

      - name: Deploy via FTPS to document root
        id: ftps
        if: steps.sftp.outcome != 'success'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          server-dir: ./
          local-dir: ./
          state-name: greengroup-root
          log-level: verbose
          exclude: |
            **/.git/**
            **/.github/**
            **/tools/**
            **/.gitignore

      - name: Report deploy result
        run: |
          if [ "${{ steps.sftp.outcome }}" = "success" ] || [ "${{ steps.ftps.outcome }}" = "success" ]; then
            echo "FTP upload completed."
            exit 0
          fi
          echo "::warning::FTP deploy failed (check FTP_PASSWORD in GitHub Secrets)."
          echo "Site will update via cPanel cron within 5 minutes if cron is configured."
          echo "Cron command: /bin/bash /home/ijh19zqesepn/repositories/GreenGroup/tools/cpanel-cron-deploy.sh"
          exit 0

      - name: Verify live site updated
        continue-on-error: true
        run: |
          sleep 25
          body=$(curl -fsSL "https://greengrouplogistics.com/greenos.html?cachebust=$(date +%s)" || true)
          ver=$(curl -fsSL "https://greengrouplogistics.com/deploy-version.txt?cachebust=$(date +%s)" || true)
          echo "deploy-version.txt: ${ver:-not found}"
          if echo "$body" | grep -q 'greenos-portal'; then
            echo "Live site shows new GreenOS design."
          else
            echo "::notice::Waiting for cPanel cron or manual Deploy HEAD in cPanel Git."
