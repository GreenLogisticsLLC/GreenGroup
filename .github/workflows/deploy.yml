name: Deploy to live site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Preferred: cPanel pulls from GitHub and runs .cpanel.yml (no FTP password).
  cpanel-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cPanel pull and deploy
        env:
          WEBHOOK_URL: ${{ secrets.CPANEL_DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "CPANEL_DEPLOY_WEBHOOK_URL not set — skipping webhook deploy."
            echo "Add it from: cPanel -> Git Version Control -> Manage -> Pull or Deploy -> Webhook URL"
            exit 0
          fi
          echo "Triggering cPanel deploy webhook..."
          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"ref":"refs/heads/main"}'
          echo "cPanel webhook triggered successfully."

  ftp-deploy:
    runs-on: ubuntu-latest
    needs: cpanel-webhook
    if: ${{ always() }}
    steps:
      - name: Resolve FTP credentials
        id: creds
        env:
          S_SERVER: ${{ secrets.FTP_SERVER }}
          S_USER: ${{ secrets.FTP_USERNAME }}
          S_PASS: ${{ secrets.FTP_PASSWORD }}
          V_SERVER: ${{ vars.FTP_SERVER }}
          V_USER: ${{ vars.FTP_USERNAME }}
        run: |
          server="${S_SERVER:-$V_SERVER}"
          user="${S_USER:-$V_USER}"
          pass="$S_PASS"
          echo "FTP_SERVER length: ${#server}"
          echo "FTP_USERNAME length: ${#user}"
          echo "FTP_PASSWORD length: ${#pass}"
          if [ -z "$server" ] || [ -z "$user" ] || [ -z "$pass" ]; then
            echo "::warning::FTP credentials incomplete."
            echo "Add Repository secrets (Settings -> Secrets and variables -> Actions -> Repository secrets):"
            echo "  FTP_SERVER, FTP_USERNAME, FTP_PASSWORD"
            echo "NOT the Variables tab. Password must be a Secret, not a Variable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "FTP_SERVER=$server" >> "$GITHUB_ENV"
          echo "FTP_USERNAME=$user" >> "$GITHUB_ENV"
          echo "FTP_PASSWORD=$pass" >> "$GITHUB_ENV"

      - name: Skip FTP when credentials missing
        if: steps.creds.outputs.skip == 'true'
        run: echo "FTP deploy skipped — configure secrets or use cPanel webhook."

      - name: Checkout repository
        if: steps.creds.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        id: ftps
        if: steps.creds.outputs.skip != 'true'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          server-dir: public_html/
          local-dir: ./
          log-level: minimal
          exclude: |
            **/.git/**
            **/.github/**
            **/tools/**
            **/.gitignore

      - name: Deploy via SFTP (port 22)
        id: sftp
        if: steps.creds.outputs.skip != 'true' && steps.ftps.outcome == 'failure'
        continue-on-error: true
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          port: 22
          local_path: ./*
          remote_path: /home/ijh19zqesepn/public_html/
          sftp_only: true

      - name: Report FTP result
        if: steps.creds.outputs.skip != 'true'
        run: |
          if [ "${{ steps.ftps.outcome }}" = "success" ] || [ "${{ steps.sftp.outcome }}" = "success" ]; then
            echo "FTP/SFTP deploy succeeded."
            exit 0
          fi
          echo "::warning::FTP deploy failed. Use cPanel webhook (recommended) or fix FTP password in cPanel."
