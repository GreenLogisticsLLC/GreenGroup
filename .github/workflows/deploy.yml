name: Deploy to live site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to document root (./)
        id: root
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          server-dir: ./
          local-dir: ./
          log-level: verbose
          exclude: |
            **/.git/**
            **/.github/**
            **/tools/**
            **/.gitignore

      - name: Deploy to public_html/
        id: publichtml
        if: steps.root.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          server-dir: public_html/
          local-dir: ./
          log-level: verbose
          exclude: |
            **/.git/**
            **/.github/**
            **/tools/**
            **/.gitignore

      - name: Verify live site updated
        run: |
          sleep 15
          body=$(curl -fsSL "https://greengrouplogistics.com/greenos.html?cachebust=$(date +%s)" || true)
          if echo "$body" | grep -q 'greenos-portal'; then
            echo "Live site shows new GreenOS design."
            exit 0
          fi
          echo "::warning::greenos.html on live site may still be cached or FTP path needs checking."
          if [ "${{ steps.root.outcome }}" != "success" ] && [ "${{ steps.publichtml.outcome }}" != "success" ]; then
            echo "::error::FTP deploy failed."
            exit 1
          fi
