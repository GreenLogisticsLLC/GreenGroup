name: Deploy site to cPanel (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          # If FTP opens directly in public_html, use server-dir: ./
          # If FTP opens in home folder, use server-dir: public_html/
          server-dir: public_html/
          local-dir: ./
          exclude: |
            **/.git/**
            **/.github/**
            **/tools/**
            **/.gitignore
            **/.cpanel.yml
            **/deploy-check.txt
