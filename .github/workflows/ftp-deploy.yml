name: Deploy site to cPanel (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          missing=0
          if [ -z "$FTP_SERVER" ]; then echo "::error::Secret FTP_SERVER is empty"; missing=1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::Secret FTP_USERNAME is empty"; missing=1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::Secret FTP_PASSWORD is empty"; missing=1; fi
          if [ "$missing" -eq 1 ]; then exit 1; fi
          echo "FTP secrets are set."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTPS (try 1)
        id: ftps
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          server-dir: public_html/
          local-dir: ./
          log-level: verbose
          exclude: |
            **/.git/**
            **/.github/**
            **/tools/**
            **/.gitignore
            **/.cpanel.yml
            **/deploy-check.txt

      - name: Deploy via plain FTP (try 2)
        id: ftp
        if: steps.ftps.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: public_html/
          local-dir: ./
          log-level: verbose
          exclude: |
            **/.git/**
            **/.github/**
            **/tools/**
            **/.gitignore
            **/.cpanel.yml
            **/deploy-check.txt

      - name: Deploy via FTPS to root (try 3)
        id: ftps_root
        if: steps.ftps.outcome == 'failure' && steps.ftp.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          server-dir: ./
          local-dir: ./
          log-level: verbose
          exclude: |
            **/.git/**
            **/.github/**
            **/tools/**
            **/.gitignore
            **/.cpanel.yml
            **/deploy-check.txt

      - name: Fail if all deploy attempts failed
        if: steps.ftps.outcome == 'failure' && steps.ftp.outcome == 'failure' && steps.ftps_root.outcome == 'failure'
        run: |
          echo "::error::All FTP deploy attempts failed. Use FileZilla to upload tools/upload-pack to public_html, or check FTP_SERVER hostname in cPanel -> Configure FTP Client."
          exit 1
